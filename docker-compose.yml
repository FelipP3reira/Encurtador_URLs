services:
  postgres:
    image: postgres:16-alpine
    container_name: encurtador-postgres
    environment:
      POSTGRES_USER: encurtador
      POSTGRES_PASSWORD: encurtador
      POSTGRES_DB: encurtador
    ports:
      - '5435:5432'
    volumes:
      - encurtador-pg:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U encurtador -d encurtador']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: encurtador-redis
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  encurtador-pg:
